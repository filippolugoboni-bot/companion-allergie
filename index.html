  .ci-eve { background:linear-gradient(160deg,#2A3B47,#1F2E37); border-radius:20px; padding:18px; }

/* ---------- Modello indice ---------- */
function airAmp(){ return 1 + Math.min(Math.max((AIR.aqi-50)/120,0),0.4); }
function baseP(level){ return (level/5) * 0.55; }
function probFor(level){ return Math.min(0.95, baseP(level)*airAmp()); }
function computeBaseIndex(){
  const sel = ALLERGENS.filter(a=>selected.has(a.id));
  if(!sel.length) return null;
  let prodNo = 1; sel.forEach(a=>{ prodNo *= (1 - probFor(a.level)); });
  return Math.round((1 - prodNo) * 100);
}
function symptomScore(e){
  const m={bene:0,cosi:0.5,male:1}[e.mood] ?? 0.5;
  const a = e.anti?1:0;
  let s = 0.65*m + 0.35*a;
  if(e.better==="si") s = Math.max(0, s-0.1);
  return s;
}
function sensitivity(){
  const past=Object.keys(diary).filter(k=>k<TODAY).sort();
  if(past.length<2) return 1;
  let ema=null; const alpha=0.5;
  past.forEach(k=>{ const s=symptomScore(diary[k]); ema = ema===null? s : alpha*s+(1-alpha)*ema; });
  return Math.min(1.25, Math.max(0.85, 1 + 0.5*(ema-0.4)));
}
function personalize(v){ return Math.round(Math.min(100, Math.max(0, v*sensitivity()))); }
function computeIndex(){ const b=computeBaseIndex(); return b===null? null : personalize(b); }
function pollenFactor(){ const lv=ALLERGENS.filter(a=>selected.has(a.id)).map(a=>a.level); return lv.length?Math.max(...lv)/5:0; }
function bestHour(){ const f=pollenFactor(); let best=-1,bv=Infinity; for(let h=6;h<=22;h++){ const c=0.6*(POLLEN_HOUR[h]*f)+0.4*POLLUTION_HOUR[h]; if(c<bv){bv=c;best=h;} } return best; }

function risk(s){ const i = s<25?0 : s<50?1 : s<75?2 : 3; const fromto=[["#2A9D8F","#1E7A6E"],["#E9C46A","#C99B3A"],["#F4A261","#D67E3E"],["#E76F51","#C5502F"]][i]; return {i, from:fromto[0], to:fromto[1]}; }
function levelInfo(l){ const i = l>=5?3 : l>=4?2 : l>=3?1 : 0; return {c:MAP_COLORS[i], i}; }
function levelWord(l){ return L().level[levelInfo(l).i]; }
function animateCount(el, from, to){
  const dur=450, t0=performance.now();
  function step(t){ const k=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-k,3); if(!document.body.contains(el)) return; el.textContent=Math.round(from+(to-from)*e); if(k<1) requestAnimationFrame(step); }
  requestAnimationFrame(step);
}

function renderHourly(){

  const maxP=Math.max.apply(null,POLLEN_HOUR), thr=0.45*maxP;

  blocks.forEach(b=>b.classList.add('reveal'));
  if(!('IntersectionObserver' in window)){ blocks.forEach(b=>b.classList.add('in')); return; }
  const io=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); }, {threshold:0.12, rootMargin:'0px 0px -40px 0px'});
  blocks.forEach(b=>io.observe(b));
}
if(unlocked) initReveal();
</script>
</body>
